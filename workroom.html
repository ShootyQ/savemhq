<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Workroom</title>
    <meta name="description" content="Private office command center display." />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="workroom-display">
    <main id="workroom-display" class="workroom-display-shell">
      <section id="workroom-display-gate" class="workroom-gate">
        <p class="workroom-eyebrow">Private office system</p>
        <h1>The Workroom</h1>
        <p id="workroom-display-gate-message">Checking your private access…</p>
        <a id="workroom-display-sign-in" class="workroom-button workroom-button-primary hidden" href="workroom-control.html">Sign in from the control room</a>
      </section>
      <div id="workroom-display-app" class="hidden">
        <header class="workroom-display-header">
          <p id="workroom-date" class="workroom-display-date">—</p>
          <time id="workroom-clock" class="workroom-clock">—</time>
        </header>
        <section class="workroom-display-focus"><h1 id="workroom-display-focus">Choose the work that matters.</h1><p id="workroom-display-next">Your next action will appear here.</p></section>
        <section class="workroom-tv-grid">
          <article class="workroom-tv-card workroom-tv-tasks"><div class="workroom-tv-heading"><h2>Tasks</h2><span id="workroom-task-count" class="workroom-tv-count">0</span></div><div id="workroom-display-tasks" class="workroom-tv-list"></div></article>
          <article class="workroom-tv-card"><div class="workroom-tv-heading"><h2>Projects</h2></div><div id="workroom-display-projects" class="workroom-tv-list"></div></article>
          <article class="workroom-tv-card"><div class="workroom-tv-heading"><h2>Calendar</h2></div><div id="workroom-display-events" class="workroom-tv-list"></div></article>
          <article class="workroom-tv-card"><div class="workroom-tv-heading"><h2>Mail</h2><span id="workroom-mail-count" class="workroom-tv-count">0</span></div><div id="workroom-display-mail" class="workroom-tv-list"></div></article>
          <article class="workroom-tv-card workroom-tv-finance"><div class="workroom-tv-heading"><h2>Finance</h2></div><div id="workroom-display-finance" class="workroom-tv-list"></div></article>
        </section>
        <footer class="workroom-display-footer"><span id="workroom-display-intention">Work with intention.</span><span id="workroom-sync-status">Waiting for Google sync…</span></footer>
      </div>
    </main>
    <script type="module" src="js/workroom-display.js"></script>
  </body>
</html>
